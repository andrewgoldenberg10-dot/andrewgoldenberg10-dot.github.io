<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NBA Roster Arena Trivia Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-white p-4 md:p-6 min-h-screen">

    <div class="max-w-4xl mx-auto space-y-6 mt-4">
        <header class="bg-gray-900 border border-gray-800 p-6 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-orange-500 tracking-tight">⏱️ ROSTER ARENA TRIVIA</h1>
                <p class="text-xs text-gray-400 mt-1">Name all players from the randomly chosen historical NBA team database.</p>
            </div>
            <div id="trivia-timer-block" class="bg-gray-950 px-5 py-3 rounded-xl border border-gray-800 text-center font-mono shrink-0 hidden">
                <span class="text-[10px] font-bold text-red-400 block uppercase tracking-wider">Remaining Time</span>
                <span id="trivia-countdown" class="text-xl font-black text-white">01:00</span>
            </div>
        </header>

        <div id="trivia-setup-card" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-6">
            <h2 class="text-lg font-black tracking-tight text-gray-200">Set Up Your Match Variant</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wide">Match Type Mode</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setTriviaMode('solo')" id="tmode-solo" class="py-3 px-4 bg-orange-500 text-white font-black rounded-xl text-xs uppercase tracking-wider cursor-pointer">🕹️ Solo Run</button>
                        <button onclick="setTriviaMode('versus')" id="tmode-versus" class="py-3 px-4 bg-gray-950 border border-gray-800 text-gray-300 font-bold rounded-xl text-xs uppercase tracking-wider cursor-pointer">🤖 Bot Matchup</button>
                    </div>
                </div>
                <div id="bot-diff-container" class="space-y-2 opacity-40 pointer-events-none transition-opacity">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wide">Bot AI Difficulty Scaling</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setBotDifficulty('easy')" id="diff-easy" class="py-3 bg-gray-950 border border-gray-800 text-gray-400 text-xs font-bold rounded-xl uppercase tracking-wider cursor-pointer">Easy</button>
                        <button onclick="setBotDifficulty('medium')" id="diff-medium" class="py-3 bg-orange-500 text-white text-xs font-bold rounded-xl uppercase tracking-wider cursor-pointer">Medium</button>
                        <button onclick="setBotDifficulty('hard')" id="diff-hard" class="py-3 bg-gray-950 border border-gray-800 text-gray-400 text-xs font-bold rounded-xl uppercase tracking-wider cursor-pointer">Hard</button>
                    </div>
                </div>
            </div>
            <button id="start-btn" onclick="startTriviaMatch()" class="w-full bg-gray-800 text-gray-600 font-black py-4 rounded-xl uppercase tracking-wider text-sm cursor-not-allowed" disabled>
                Loading Roster Database...
            </button>
        </div>

        <div id="trivia-active-board" class="space-y-6 hidden">
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl text-center space-y-2">
                <span id="target-team-year" class="text-xs font-bold bg-orange-950 border border-orange-900/40 text-orange-400 px-3 py-1 rounded-full font-mono"></span>
                <h2 id="target-team-title" class="text-3xl font-black tracking-tight text-white"></h2>
                <p class="text-xs text-gray-400 max-w-md mx-auto">Type a player's full first or last name below. Correct entries automatically claim slots.</p>
            </div>

            <div id="vs-scoreboard" class="grid grid-cols-2 gap-4 hidden">
                <div class="bg-gray-900 border border-emerald-900/30 p-4 rounded-xl text-center">
                    <span class="text-[10px] text-gray-400 uppercase font-black tracking-wider block">Your Score</span>
                    <span id="player-score-lbl" class="text-2xl font-black text-emerald-400 font-mono">0</span>
                </div>
                <div class="bg-gray-900 border border-red-900/30 p-4 rounded-xl text-center">
                    <span class="text-[10px] text-gray-400 uppercase font-black tracking-wider block">Bot Score</span>
                    <span id="bot-score-lbl" class="text-2xl font-black text-red-400 font-mono">0</span>
                </div>
            </div>

            <div id="game-over-banner" class="bg-gray-900 border border-orange-500/30 p-5 rounded-2xl hidden flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
                <div>
                    <h2 id="banner-headline" class="text-xl font-black text-orange-500"></h2>
                    <p id="banner-summary" class="text-xs text-gray-400 mt-1"></p>
                </div>
                <button onclick="resetToMenu()" class="bg-orange-500 text-white font-black px-6 py-3 rounded-xl uppercase text-xs tracking-wider transition hover:bg-orange-600 cursor-pointer w-full sm:w-auto">
                    Play Another Round
                </button>
            </div>

            <div id="input-container-block" class="flex gap-3">
                <input type="text" id="trivia-input" oninput="checkTriviaGuess()" placeholder="Type complete first or last name..." class="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-orange-500 text-sm font-semibold tracking-wide placeholder-gray-600">
                <button onclick="giveUpMatch()" class="bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-black text-xs uppercase tracking-wider px-5 rounded-xl transition transform active:scale-95 cursor-pointer">
                    🏳️ Give Up
                </button>
            </div>

            <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Roster Fill Progress (<span id="unlocked-count" class="font-mono text-white">0</span> / <span id="total-count" class="font-mono text-gray-500">0</span>)</h3>
                <div id="roster-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5"></div>
            </div>
        </div>
    </div>

    <script>
        let historicalTeamsDatabase = [];
        let currentTriviaMatch = null;
        let guessedRosterNames = [];
        let botGuessedRosterNames = [];
        let triviaGameMode = "solo";
        let botDifficulty = "medium";
        let triviaTimeRemaining = 60;
        let triviaTimerInterval = null;
        let botSimulationInterval = null;
        let isGameOver = false;

        window.addEventListener('DOMContentLoaded', () => {
            fetch('./nba_historical_rosters.json')
                .then(res => res.json())
                .then(data => {
                    historicalTeamsDatabase = data;
                    const startBtn = document.getElementById('start-btn');
                    startBtn.disabled = false;
                    startBtn.className = "w-full bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-wider transition transform active:scale-95 cursor-pointer text-sm";
                    startBtn.innerText = "Generate Target Team & Start Game";
                })
                .catch(err => {
                    console.error("Failed to load local database: ", err);
                    document.getElementById('start-btn').innerText = "Database Connection Failed.";
                });
        });

        function setTriviaMode(mode) {
            triviaGameMode = mode;
            const soloBtn = document.getElementById('tmode-solo');
            const vsBtn = document.getElementById('tmode-versus');
            const botBox = document.getElementById('bot-diff-container');

            if (mode === 'solo') {
                soloBtn.className = "py-3 px-4 bg-orange-500 text-white font-black rounded-xl text-xs uppercase tracking-wider cursor-pointer";
                vsBtn.className = "py-3 px-4 bg-gray-950 border border-gray-800 text-gray-300 font-bold rounded-xl text-xs uppercase tracking-wider cursor-pointer";
                botBox.classList.add('opacity-40', 'pointer-events-none');
            } else {
                vsBtn.className = "py-3 px-4 bg-orange-500 text-white font-black rounded-xl text-xs uppercase tracking-wider cursor-pointer";
                soloBtn.className = "py-3 px-4 bg-gray-950 border border-gray-800 text-gray-300 font-bold rounded-xl text-xs uppercase tracking-wider cursor-pointer";
                botBox.classList.remove('opacity-40', 'pointer-events-none');
            }
        }

        function setBotDifficulty(level) {
            botDifficulty = level;
            ['easy', 'medium', 'hard'].forEach(l => {
                document.getElementById(`diff-${l}`).className = "py-3 bg-gray-950 border border-gray-800 text-gray-400 text-xs font-bold rounded-xl uppercase tracking-wider cursor-pointer";
            });
            document.getElementById(`diff-${level}`).className = "py-3 bg-orange-500 text-white text-xs font-bold rounded-xl uppercase tracking-wider cursor-pointer";
        }

        function startTriviaMatch() {
            if (historicalTeamsDatabase.length === 0) return;
            
            clearInterval(triviaTimerInterval);
            clearInterval(botSimulationInterval);
            isGameOver = false;

            const randIndex = Math.floor(Math.random() * historicalTeamsDatabase.length);
            currentTriviaMatch = historicalTeamsDatabase[randIndex];
            guessedRosterNames = [];
            botGuessedRosterNames = [];
            triviaTimeRemaining = 60;

            document.getElementById('game-over-banner').classList.add('hidden');
            document.getElementById('input-container-block').classList.remove('hidden');
            document.getElementById('trivia-input').disabled = false;
            document.getElementById('trivia-input').value = "";
            
            document.getElementById('target-team-year').innerText = currentTriviaMatch.year;
            document.getElementById('target-team-title').innerText = currentTriviaMatch.name;
            document.getElementById('player-score-lbl').innerText = "0";
            document.getElementById('bot-score-lbl').innerText = "0";
            document.getElementById('trivia-countdown').innerText = "01:00";

            document.getElementById('trivia-setup-card').classList.add('hidden');
            document.getElementById('trivia-active-board').classList.remove('hidden');
            document.getElementById('trivia-timer-block').classList.remove('hidden');
            
            if(triviaGameMode === 'versus') {
                document.getElementById('vs-scoreboard').classList.remove('hidden');
                runBotSimulation();
            } else {
                document.getElementById('vs-scoreboard').classList.add('hidden');
            }

            renderRosterGrid();

            triviaTimerInterval = setInterval(() => {
                triviaTimeRemaining--;
                let sec = triviaTimeRemaining;
                document.getElementById('trivia-countdown').innerText = `00:${sec < 10 ? '0' : ''}${sec}`;
                if (triviaTimeRemaining <= 0) endMatch(false);
            }, 1000);
        }

        function renderRosterGrid() {
            const grid = document.getElementById('roster-grid');
            grid.innerHTML = currentTriviaMatch.roster.map((player, idx) => {
                if (guessedRosterNames.includes(player)) {
                    return `<div class="bg-emerald-950/40 border border-emerald-500/30 p-3 rounded-xl text-center"><span class="text-xs font-bold text-emerald-400 block truncate">${player}</span><span class="text-[8px] font-mono font-bold text-emerald-600 block mt-0.5">✓ Found</span></div>`;
                } else if (botGuessedRosterNames.includes(player)) {
                    return `<div class="bg-amber-950/40 border border-amber-500/30 p-3 rounded-xl text-center"><span class="text-xs font-bold text-amber-400 block truncate">${player}</span><span class="text-[8px] font-mono font-bold text-amber-600 block mt-0.5">🤖 Bot Stole</span></div>`;
                } else if (isGameOver) {
                    // Highlights completely missing un-guessed names cleanly in red blocks
                    return `<div class="bg-red-950/30 border border-red-900/40 p-3 rounded-xl text-center"><span class="text-xs font-bold text-red-400 block truncate">${player}</span><span class="text-[8px] font-mono font-bold text-red-700 block mt-0.5">Missing</span></div>`;
                } else {
                    return `<div class="bg-gray-950 border border-gray-900 p-3 rounded-xl text-center text-[10px] font-mono font-black text-gray-700 uppercase flex flex-col justify-center min-h-[52px]">Player ${idx+1}</div>`;
                }
            }).join('');

            document.getElementById('unlocked-count').innerText = guessedRosterNames.length + botGuessedRosterNames.length;
            document.getElementById('total-count').innerText = currentTriviaMatch.roster.length;
        }

        function checkTriviaGuess() {
            if (isGameOver) return;
            const input = document.getElementById('trivia-input');
            const val = input.value.trim().toLowerCase();

            currentTriviaMatch.roster.forEach(player => {
                if (!guessedRosterNames.includes(player) && !botGuessedRosterNames.includes(player)) {
                    const nameParts = player.toLowerCase().split(' ');
                    
                    if (nameParts.includes(val) || player.toLowerCase() === val) {
                        guessedRosterNames.push(player);
                        input.value = "";
                        document.getElementById('player-score-lbl').innerText = guessedRosterNames.length;
                        renderRosterGrid();
                        if (guessedRosterNames.length + botGuessedRosterNames.length === currentTriviaMatch.roster.length) endMatch(false);
                    }
                }
            });
        }

        function runBotSimulation() {
            let delay = botDifficulty === 'easy' ? 7000 : botDifficulty === 'medium' ? 4500 : 2500;
            botSimulationInterval = setInterval(() => {
                const choices = currentTriviaMatch.roster.filter(p => !guessedRosterNames.includes(p) && !botGuessedRosterNames.includes(p));
                if (choices.length > 0) {
                    const pick = choices[Math.floor(Math.random() * choices.length)];
                    botGuessedRosterNames.push(pick);
                    document.getElementById('bot-score-lbl').innerText = botGuessedRosterNames.length;
                    renderRosterGrid();
                    if (guessedRosterNames.length + botGuessedRosterNames.length === currentTriviaMatch.roster.length) endMatch(false);
                }
            }, delay);
        }

        function giveUpMatch() {
            if (isGameOver) return;
            endMatch(true);
        }

        function endMatch(didGiveUp = false) {
            isGameOver = true;
            clearInterval(triviaTimerInterval);
            clearInterval(botSimulationInterval);
            
            // Swap input field with our custom results banner card
            document.getElementById('input-container-block').classList.add('hidden');
            document.getElementById('game-over-banner').classList.remove('hidden');
            
            renderRosterGrid(); 
            
            let headline = "Round Complete!";
            let summary = `You identified ${guessedRosterNames.length} out of ${currentTriviaMatch.roster.length} players total. See missed answers in red below!`;

            if (didGiveUp) {
                headline = "🏳️ Match Conceded";
                summary = `You opted to forfeit. You completed ${guessedRosterNames.length} tiles. Rest revealed below!`;
            } else if(triviaGameMode === 'versus') {
                if(guessedRosterNames.length > botGuessedRosterNames.length) {
                    headline = "🏆 Victory!";
                    summary = `You defeated the AI bot player ${guessedRosterNames.length} to ${botGuessedRosterNames.length}!`;
                } else if(guessedRosterNames.length < botGuessedRosterNames.length) {
                    headline = "❌ Defeat";
                    summary = `The bot outperformed your draft ${botGuessedRosterNames.length} to ${guessedRosterNames.length}.`;
                } else {
                    headline = "🤝 Tie Match";
                    summary = `An equal lock! Both factions managed an even ${guessedRosterNames.length} points.`;
                }
            }

            document.getElementById('banner-headline').innerText = headline;
            document.getElementById('banner-summary').innerText = summary;
        }

        function resetToMenu() {
            document.getElementById('trivia-active-board').classList.add('hidden');
            document.getElementById('trivia-timer-block').classList.add('hidden');
            document.getElementById('trivia-setup-card').classList.remove('hidden');
        }
    </script>
</body>
</html>
